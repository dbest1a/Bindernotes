name: Fix Supabase Backend Seed

on:
  workflow_dispatch:
    inputs:
      repair_migration_history:
        description: "Mark already-applied legacy migrations as applied in Supabase migration history"
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  verify-migrate-seed:
    runs-on: ubuntu-latest
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_SYSTEM_OWNER_ID: ${{ secrets.SUPABASE_SYSTEM_OWNER_ID }}
      VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate required secrets
        shell: bash
        run: |
          required=(
            "SUPABASE_DB_URL"
            "SUPABASE_ACCESS_TOKEN"
            "SUPABASE_URL"
            "SUPABASE_SERVICE_ROLE_KEY"
            "VITE_SUPABASE_ANON_KEY"
          )

          missing=0
          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing secret::$name is required for this workflow."
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          python - <<'PY'
          import os
          import re
          import sys
          from urllib.parse import urlparse

          raw = os.environ["SUPABASE_DB_URL"]

          if "[YOUR-PASSWORD]" in raw:
            print("::error title=Invalid SUPABASE_DB_URL::Replace [YOUR-PASSWORD] with the real database password and URL-encode special characters.")
            sys.exit(1)

          try:
            parsed = urlparse(raw)
          except Exception:
            print("::error title=Invalid SUPABASE_DB_URL::SUPABASE_DB_URL must be a valid postgres URL.")
            sys.exit(1)

          if parsed.scheme not in {"postgres", "postgresql"}:
            print("::error title=Invalid SUPABASE_DB_URL::Use a postgres:// or postgresql:// session pooler URL.")
            sys.exit(1)

          if not parsed.username or not parsed.password:
            print("::error title=Invalid SUPABASE_DB_URL::Use the full session pooler URL with username and URL-encoded password included.")
            sys.exit(1)

          host = parsed.hostname or ""
          if host.startswith("db.") and host.endswith(".supabase.co"):
            print("::error title=Invalid SUPABASE_DB_URL::Use the session pooler host, not the direct db.<project-ref>.supabase.co host, in GitHub Actions.")
            sys.exit(1)

          if not re.fullmatch(r"aws-\d+-[a-z0-9-]+\.pooler\.supabase\.com", host):
            print("::error title=Invalid SUPABASE_DB_URL::Expected session pooler host format aws-<n>-<region>.pooler.supabase.com.")
            sys.exit(1)

          if parsed.port != 5432:
            print("::error title=Invalid SUPABASE_DB_URL::Expected session pooler port 5432.")
            sys.exit(1)

          if not parsed.username.startswith("postgres."):
            print("::error title=Invalid SUPABASE_DB_URL::Expected pooler username format postgres.<project-ref>.")
            sys.exit(1)

          if "sslmode=require" not in (parsed.query or ""):
            print("::error title=Invalid SUPABASE_DB_URL::Session pooler URL must include sslmode=require.")
            sys.exit(1)
          PY

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install PostgreSQL client
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Diagnose and optionally repair Supabase migration history
        shell: bash
        env:
          REPAIR_MIGRATION_HISTORY: ${{ github.event.inputs.repair_migration_history }}
        run: bash scripts/reconcile-supabase-migration-history.sh

      - name: Migration list after reconciliation
        shell: bash
        run: supabase migration list --db-url "$SUPABASE_DB_URL" | tee .migration-diagnostics/migration-list-after.txt

      - name: Migration dry run
        shell: bash
        run: |
          set -o pipefail
          supabase db push --db-url "$SUPABASE_DB_URL" --dry-run | tee .migration-diagnostics/migration-dry-run.txt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: Push Supabase migrations
        shell: bash
        run: |
          set -o pipefail
          supabase db push --db-url "$SUPABASE_DB_URL" --yes | tee .migration-diagnostics/migration-push.txt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: Reload Supabase API schema cache
        shell: bash
        run: |
          psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -c "notify pgrst, 'reload schema';"
          sleep 8

      - name: Seed backend-native system content
        shell: bash
        run: |
          set -o pipefail
          : > .migration-diagnostics/seed-system.txt
          for attempt in 1 2 3; do
            echo "Seed attempt $attempt" | tee -a .migration-diagnostics/seed-system.txt
            if npm run seed:system 2>&1 | tee -a .migration-diagnostics/seed-system.txt; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -c "notify pgrst, 'reload schema';"
              sleep 10
            fi
          done
          exit 1

      - name: Verify backend-native system seed counts
        shell: bash
        run: |
          set -o pipefail
          npm run verify:system-seed | tee .migration-diagnostics/verify-system-seed.txt

      - name: Final migration and seed summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Final workflow summary"
            echo
            echo "### Migrations listed as local-only"
            if [ -s .migration-diagnostics/local-only.tsv ]; then
              while IFS=$'\t' read -r version migration_names; do
                echo "- \`$version\`: $migration_names"
              done < .migration-diagnostics/local-only.tsv
            else
              echo "- None recorded"
            fi
            echo
            echo "### Migrations marked applied"
            if [ -s .migration-diagnostics/repaired.tsv ]; then
              while IFS=$'\t' read -r version migration_names; do
                echo "- \`$version\`: $migration_names"
              done < .migration-diagnostics/repaired.tsv
            else
              echo "- None"
            fi
            echo
            echo "### Remaining schema mismatch"
            if [ -s .migration-diagnostics/schema-mismatch.tsv ]; then
              while IFS=$'\t' read -r version migration_names missing; do
                echo "- \`$version\`: $migration_names"
                echo "  Missing checks: $missing"
              done < .migration-diagnostics/schema-mismatch.tsv
            else
              echo "- None recorded"
            fi
            echo
            echo "### Migration dry run"
            if [ -s .migration-diagnostics/migration-dry-run.txt ]; then
              echo '```text'
              tail -n 80 .migration-diagnostics/migration-dry-run.txt
              echo '```'
            else
              echo "- Not reached"
            fi
            echo
            echo "### Migration push"
            if [ -s .migration-diagnostics/migration-push.txt ]; then
              echo '```text'
              tail -n 80 .migration-diagnostics/migration-push.txt
              echo '```'
            else
              echo "- Not reached"
            fi
            echo
            echo "### Seed"
            if [ -s .migration-diagnostics/seed-system.txt ]; then
              echo "- Seed step ran"
            else
              echo "- Seed step not reached"
            fi
            if [ -s .migration-diagnostics/verify-system-seed.txt ]; then
              echo "- Seed verification ran"
            else
              echo "- Seed verification not reached"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
