name: Fix Supabase Backend Seed

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  verify-migrate-seed:
    runs-on: ubuntu-latest
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_SYSTEM_OWNER_ID: ${{ secrets.SUPABASE_SYSTEM_OWNER_ID }}
      VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate required secrets
        shell: bash
        run: |
          required=(
            "SUPABASE_DB_URL"
            "SUPABASE_ACCESS_TOKEN"
            "SUPABASE_URL"
            "SUPABASE_SERVICE_ROLE_KEY"
            "VITE_SUPABASE_ANON_KEY"
          )

          missing=0
          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing secret::$name is required for this workflow."
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          python - <<'PY'
          import os
          import re
          import sys
          from urllib.parse import urlparse

          raw = os.environ["SUPABASE_DB_URL"]

          if "[YOUR-PASSWORD]" in raw:
            print("::error title=Invalid SUPABASE_DB_URL::Replace [YOUR-PASSWORD] with the real database password and URL-encode special characters.")
            sys.exit(1)

          try:
            parsed = urlparse(raw)
          except Exception:
            print("::error title=Invalid SUPABASE_DB_URL::SUPABASE_DB_URL must be a valid postgres URL.")
            sys.exit(1)

          if parsed.scheme not in {"postgres", "postgresql"}:
            print("::error title=Invalid SUPABASE_DB_URL::Use a postgres:// or postgresql:// session pooler URL.")
            sys.exit(1)

          if not parsed.username or not parsed.password:
            print("::error title=Invalid SUPABASE_DB_URL::Use the full session pooler URL with username and URL-encoded password included.")
            sys.exit(1)

          host = parsed.hostname or ""
          if host.startswith("db.") and host.endswith(".supabase.co"):
            print("::error title=Invalid SUPABASE_DB_URL::Use the session pooler host, not the direct db.<project-ref>.supabase.co host, in GitHub Actions.")
            sys.exit(1)

          if not re.fullmatch(r"aws-\d+-[a-z0-9-]+\.pooler\.supabase\.com", host):
            print("::error title=Invalid SUPABASE_DB_URL::Expected session pooler host format aws-<n>-<region>.pooler.supabase.com.")
            sys.exit(1)

          if parsed.port != 5432:
            print("::error title=Invalid SUPABASE_DB_URL::Expected session pooler port 5432.")
            sys.exit(1)

          if not parsed.username.startswith("postgres."):
            print("::error title=Invalid SUPABASE_DB_URL::Expected pooler username format postgres.<project-ref>.")
            sys.exit(1)

          if "sslmode=require" not in (parsed.query or ""):
            print("::error title=Invalid SUPABASE_DB_URL::Session pooler URL must include sslmode=require.")
            sys.exit(1)
          PY

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push Supabase migrations
        run: supabase db push --db-url "$SUPABASE_DB_URL" --yes
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: Seed backend-native system content
        run: npm run seed:system

      - name: Verify backend-native system seed counts
        run: npm run verify:system-seed
